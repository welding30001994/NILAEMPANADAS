<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NILAS EMPANADAS | ADMINISTRADOR DE STOCK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            background: linear-gradient(rgba(255, 0, 0, 0.15), rgba(255, 255, 255, 0.95));
            min-height: 100vh;
            padding: 2rem 5%;
        }

        /* Encabezado administrador */
        .admin-header {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 2px solid #ff0000;
        }

        .admin-titulo {
            color: #ff0000;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-botones {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-verde {
            background: #28a745;
            color: white;
        }

        .btn-verde:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .btn-rojo {
            background: #ff0000;
            color: white;
        }

        .btn-rojo:hover {
            background: #dc3545;
            transform: scale(1.05);
        }

        .btn-azul {
            background: #007bff;
            color: white;
        }

        .btn-azul:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        .btn-amarillo {
            background: #ffd700;
            color: black;
        }

        .btn-amarillo:hover {
            background: #ffc107;
            transform: scale(1.05);
        }

        /* Barra de estado */
        .estado-bar {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .ultima-actualizacion {
            color: #333;
            font-family: Arial, sans-serif;
        }

        .stock-total {
            color: #ff0000;
            font-size: 1.2rem;
        }

        /* Contenedor del menú */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* Tarjetas de empanadas en admin */
        .empanada-card-admin {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 0, 0, 0.6);
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .empanada-card-admin:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .empanada-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .empanada-nombre {
            font-size: 1.5rem;
            color: #ff0000;
            text-transform: uppercase;
        }

        .empanada-precio {
            font-size: 1.3rem;
            color: #000;
            background: rgba(255, 215, 0, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .empanada-descripcion {
            font-family: Arial, sans-serif;
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        /* Control de stock */
        .stock-control {
            background: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 10px;
        }

        .stock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .stock-label {
            font-family: Arial, sans-serif;
            color: #333;
        }

        .stock-cantidad {
            font-size: 1.8rem;
            color: #ff0000;
            font-weight: bold;
        }

        .stock-estado {
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stock-disponible {
            background: #28a745;
            color: white;
        }

        .stock-bajo {
            background: #ffc107;
            color: black;
        }

        .stock-agotado {
            background: #dc3545;
            color: white;
        }

        .stock-botones {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
        }

        .stock-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stock-btn-menos {
            background: #ff0000;
            color: white;
        }

        .stock-btn-menos:hover {
            background: #dc3545;
        }

        .stock-btn-mas {
            background: #28a745;
            color: white;
        }

        .stock-btn-mas:hover {
            background: #218838;
        }

        .stock-numero {
            font-size: 1.2rem;
            min-width: 50px;
            text-align: center;
            font-weight: bold;
        }

        .stock-input {
            width: 80px;
            padding: 0.5rem;
            text-align: center;
            border: 2px solid #ff0000;
            border-radius: 10px;
            font-size: 1rem;
        }

        .stock-agotado-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .stock-agotado-btn:hover {
            background: #c82333;
        }

        /* Botones globales */
        .acciones-globales {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        /* Modal de confirmación */
        .modal-confirm {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-confirm-contenido {
            background: rgba(0, 0, 0, 0.95);
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid #ff0000;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-confirm-titulo {
            color: #ff0000;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .modal-confirm-texto {
            color: white;
            font-family: Arial, sans-serif;
            margin-bottom: 2rem;
        }

        .modal-confirm-botones {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }
            
            .stock-botones {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <!-- Encabezado administrador -->
    <div class="admin-header">
        <div class="admin-titulo">
            <span>⚙️</span>
            NILAS EMPANADAS - ADMINISTRADOR DE STOCK
        </div>
        <div class="admin-botones">
            <a href="home.html" class="btn btn-verde">🏠 IR A TIENDA</a>
            <button class="btn btn-amarillo" id="guardarStock">💾 GUARDAR STOCK</button>
        </div>
    </div>

    <!-- Barra de estado -->
    <div class="estado-bar">
        <div class="ultima-actualizacion" id="ultimaActualizacion">
            ⏱️ Última actualización: Nunca
        </div>
        <div class="stock-total" id="stockTotal">
            📦 Stock total: 0 unidades
        </div>
    </div>

    <!-- Contenedor del menú admin -->
    <main class="menu-container" id="menu-admin">
        <!-- Las tarjetas se generarán dinámicamente con JavaScript -->
    </main>

    <!-- Acciones globales -->
    <div class="acciones-globales">
        <button class="btn btn-verde" id="stockLleno">📦 LLENAR STOCK (50 c/u)</button>
        <button class="btn btn-rojo" id="stockCero">🚫 TODO AGOTADO</button>
        <button class="btn btn-azul" id="resetStock">🔄 RESETEAR STOCK PREDETERMINADO</button>
    </div>

    <!-- Modal de confirmación -->
    <div class="modal-confirm" id="modalConfirm">
        <div class="modal-confirm-contenido">
            <h2 class="modal-confirm-titulo">⚠️ CONFIRMAR</h2>
            <p class="modal-confirm-texto" id="modalConfirmTexto">¿Estás seguro de realizar esta acción?</p>
            <div class="modal-confirm-botones">
                <button class="btn btn-verde" id="confirmarSi">SÍ</button>
                <button class="btn btn-rojo" id="confirmarNo">NO</button>
            </div>
        </div>
    </div>

    <script>
        // Lista completa de empanadas con stock inicial
        const empanadasData = [
            { nombre: "Hawaiana", precio: 1.50, descripcion: "Mezcla tropical de piña, queso mozzarella y salchichas.", stock: 50 },
            { nombre: "Choris Queso", precio: 1.75, descripcion: "Delicioso chorizo ahumado con queso mozzarella derretido.", stock: 50 },
            { nombre: "Napolitano", precio: 1.75, descripcion: "Carne molida con queso y un toque especial estilo lasaña.", stock: 50 },
            { nombre: "Pizza", precio: 1.50, descripcion: "Salsa de pizza, peperones y jamón al estilo clásico.", stock: 50 },
            { nombre: "BBQ", precio: 1.75, descripcion: "Carne molida con deliciosa salsa bbq.", stock: 50 },
            { nombre: "Taquera", precio: 1.75, descripcion: "Carne molida con frijoles al estilo taquero.", stock: 50 },
            { nombre: "Pollo", precio: 1.50, descripcion: "Pollo sazonado con zanahoria y alverja.", stock: 50 },
            { nombre: "Carne", precio: 1.50, descripcion: "Carne molida con zanahoria y alverjas.", stock: 50 },
            { nombre: "Camaron", precio: 2.00, descripcion: "Camarón en salsa con zanahoria y alverjas.", stock: 50 },
            { nombre: "Queso Mozzarella", precio: 2.00, descripcion: "Empanada rellena de queso mozzarella derretido.", stock: 50 }
        ];

        let empanadas = [...empanadasData];
        let accionConfirmar = null;

        // Cargar stock guardado al iniciar
        function cargarStockGuardado() {
            const stockGuardado = localStorage.getItem('nilasEmpanadasStock');
            if (stockGuardado) {
                try {
                    const stockParseado = JSON.parse(stockGuardado);
                    // Actualizar stock manteniendo los datos de las empanadas
                    empanadas = empanadas.map(emp => {
                        const encontrado = stockParseado.find(e => e.nombre === emp.nombre);
                        return encontrado ? { ...emp, stock: encontrado.stock } : emp;
                    });
                    
                    const fechaGuardada = localStorage.getItem('nilasEmpanadasFecha');
                    if (fechaGuardada) {
                        document.getElementById('ultimaActualizacion').innerHTML = `⏱️ Última actualización: ${fechaGuardada}`;
                    }
                } catch (e) {
                    console.error('Error al cargar stock:', e);
                }
            }
            renderizarAdmin();
        }

        // Guardar stock
        function guardarStock() {
            const stockParaGuardar = empanadas.map(({ nombre, stock }) => ({ nombre, stock }));
            localStorage.setItem('nilasEmpanadasStock', JSON.stringify(stockParaGuardar));
            
            const fecha = new Date();
            const fechaStr = `${fecha.toLocaleDateString()} ${fecha.toLocaleTimeString()}`;
            localStorage.setItem('nilasEmpanadasFecha', fechaStr);
            
            document.getElementById('ultimaActualizacion').innerHTML = `⏱️ Última actualización: ${fechaStr}`;
            
            // Mostrar notificación
            alert('✅ Stock guardado correctamente');
            
            renderizarAdmin();
        }

        // Renderizar panel admin
        function renderizarAdmin() {
            const container = document.getElementById('menu-admin');
            container.innerHTML = '';
            
            let stockTotal = 0;
            
            empanadas.forEach((emp, index) => {
                stockTotal += emp.stock;
                
                const estadoStock = emp.stock <= 0 ? 'AGOTADO' : emp.stock <= 10 ? 'STOCK BAJO' : 'DISPONIBLE';
                const estadoClass = emp.stock <= 0 ? 'stock-agotado' : emp.stock <= 10 ? 'stock-bajo' : 'stock-disponible';
                
                const card = document.createElement('div');
                card.className = 'empanada-card-admin';
                card.innerHTML = `
                    <div class="empanada-header">
                        <h3 class="empanada-nombre">${emp.nombre}</h3>
                        <span class="empanada-precio">$${emp.precio.toFixed(2)}</span>
                    </div>
                    <p class="empanada-descripcion">${emp.descripcion}</p>
                    
                    <div class="stock-control">
                        <div class="stock-info">
                            <span class="stock-label">📦 STOCK ACTUAL</span>
                            <span class="stock-cantidad" id="stock-cant-${index}">${emp.stock}</span>
                            <span class="stock-estado ${estadoClass}">${estadoStock}</span>
                        </div>
                        
                        <div class="stock-botones">
                            <button class="stock-btn stock-btn-menos" onclick="actualizarStock(${index}, -1)">−</button>
                            <input type="number" class="stock-input" id="input-${index}" value="${emp.stock}" min="0" max="999" onchange="actualizarStockInput(${index}, this.value)">
                            <button class="stock-btn stock-btn-mas" onclick="actualizarStock(${index}, 1)">+</button>
                            <button class="stock-agotado-btn" onclick="actualizarStock(${index}, -${emp.stock})">🚫 AGOTAR</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            document.getElementById('stockTotal').innerHTML = `📦 Stock total: ${stockTotal} unidades`;
        }

        // Actualizar stock (relativo)
        window.actualizarStock = function(index, cambio) {
            const nuevaCantidad = empanadas[index].stock + cambio;
            if (nuevaCantidad >= 0) {
                empanadas[index].stock = nuevaCantidad;
                renderizarAdmin();
            }
        };

        // Actualizar stock por input
        window.actualizarStockInput = function(index, valor) {
            const nuevaCantidad = parseInt(valor) || 0;
            if (nuevaCantidad >= 0) {
                empanadas[index].stock = nuevaCantidad;
                renderizarAdmin();
            }
        };

        // Función para mostrar modal de confirmación
        function mostrarModalConfirm(texto, accion) {
            document.getElementById('modalConfirmTexto').innerText = texto;
            accionConfirmar = accion;
            document.getElementById('modalConfirm').style.display = 'flex';
        }

        // Event listeners
        document.getElementById('guardarStock').addEventListener('click', () => {
            mostrarModalConfirm('¿Guardar los cambios de stock?', () => {
                guardarStock();
            });
        });

        document.getElementById('stockLleno').addEventListener('click', () => {
            mostrarModalConfirm('¿LLENAR todo el stock a 50 unidades?', () => {
                empanadas = empanadas.map(emp => ({ ...emp, stock: 50 }));
                renderizarAdmin();
            });
        });

        document.getElementById('stockCero').addEventListener('click', () => {
            mostrarModalConfirm('¿MARCAR todo como AGOTADO?', () => {
                empanadas = empanadas.map(emp => ({ ...emp, stock: 0 }));
                renderizarAdmin();
            });
        });

        document.getElementById('resetStock').addEventListener('click', () => {
            mostrarModalConfirm('¿Restablecer stock predeterminado (50 c/u)?', () => {
                empanadas = empanadasData.map(emp => ({ ...emp, stock: 50 }));
                renderizarAdmin();
            });
        });

        // Botones del modal
        document.getElementById('confirmarSi').addEventListener('click', () => {
            if (accionConfirmar) {
                accionConfirmar();
            }
            document.getElementById('modalConfirm').style.display = 'none';
        });

        document.getElementById('confirmarNo').addEventListener('click', () => {
            document.getElementById('modalConfirm').style.display = 'none';
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('modalConfirm').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalConfirm')) {
                document.getElementById('modalConfirm').style.display = 'none';
            }
        });

        // Inicializar
        cargarStockGuardado();
    </script>
</body>
</html>
